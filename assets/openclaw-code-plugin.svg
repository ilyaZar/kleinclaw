<svg xmlns="http://www.w3.org/2000/svg" width="142" height="20" role="img" aria-label="OpenClaw: code plugin">
  <title>OpenClaw: code plugin</title>
  <linearGradient id="smooth" x2="0" y2="100%">
    <stop offset="0" stop-color="#fff" stop-opacity=".08"/>
    <stop offset="1" stop-opacity=".08"/>
  </linearGradient>
  <mask id="round">
    <rect width="142" height="20" rx="0" fill="#fff"/>
  </mask>
  <g mask="url(#round)">
    <rect width="69" height="20" fill="#000000"/>
    <rect x="69" width="73" height="20" fill="#111111"/>
    <rect width="142" height="20" fill="url(#smooth)"/>
  </g>
  <g fill="#d3473d" text-anchor="middle"
     font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11"
     font-weight="700">
    <text x="35.5" y="15" fill="#010101" fill-opacity=".25">OpenClaw</text>
    <text x="35.5" y="14">OpenClaw</text>
    <text x="104.5" y="15" fill="#010101" fill-opacity=".25">code plugin</text>
    <text x="104.5" y="14">code plugin</text>
  </g>
</svg>
